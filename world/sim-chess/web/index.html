<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>棋桌 · 世界 (AWI)</title>
<style>
  /* ============ 主题调色板（两套：暗色 / 明亮木纹）============ */
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #0e1014;            /* 页面底 */
    --bg-grad: radial-gradient(1200px 600px at 50% -10%, #1a1f29 0%, #0e1014 60%);
    --card: #161a21;          /* 卡片面 */
    --card-2: #1c212b;        /* 次级面（状态栏） */
    --line: #2a313d;          /* 描边 */
    --line-soft: #222834;
    --ink: #e8eaf0;           /* 主文字 */
    --ink-dim: #9aa1ad;       /* 次文字 */
    --ink-faint: #6b7280;     /* 弱文字/标签 */
    --accent: #4f8cff;        /* 主色 */
    --accent-ink: #ffffff;
    --danger: #e0556b;
    --term-bg: #0a0c10;       /* 终端底 */
    --board-frame: linear-gradient(145deg, #2b323d, #171b22);  /* 暗色琴键边 */
    --board-bezel: #0a0c10;
    --shadow: 0 18px 50px -18px rgba(0,0,0,.75), 0 6px 18px -10px rgba(0,0,0,.6);
    --shadow-soft: 0 8px 24px -14px rgba(0,0,0,.6);
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #f1e9db;
    --bg-grad: radial-gradient(1200px 600px at 50% -10%, #fbf6ec 0%, #ece0cd 70%);
    --card: #fffaf2;
    --card-2: #f6efe2;
    --line: #e2d4bd;
    --line-soft: #ece0cd;
    --ink: #3a322a;
    --ink-dim: #7a6e5e;
    --ink-faint: #a3917a;
    --accent: #b5732e;        /* 暖木褐 */
    --accent-ink: #fffaf2;
    --danger: #b4452f;
    --term-bg: #2a241c;       /* 终端仍偏深，等宽日志更清晰 */
    --board-frame: linear-gradient(145deg, #b98a4e, #7c5326);  /* 木纹边 */
    --board-bezel: #5c3d1c;
    --shadow: 0 18px 44px -20px rgba(92,61,28,.45), 0 6px 16px -10px rgba(92,61,28,.35);
    --shadow-soft: 0 8px 22px -14px rgba(92,61,28,.35);
  }
  :root[data-theme="light"] .term .t-ts { color: #b9a98f; }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    background-image: var(--bg-grad);
    color: var(--ink);
    padding: 22px clamp(16px, 4vw, 48px) 40px;
    transition: background-color .25s, color .25s;
  }

  /* ============ 顶栏 ============ */
  .topbar {
    max-width: 1180px; margin: 0 auto 22px;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .topbar .title { flex: 1; min-width: 0; }
  h1 { font-size: 19px; font-weight: 650; margin: 0 0 6px; letter-spacing: .2px; }
  .hint { font-size: 12.5px; color: var(--ink-dim); line-height: 1.6; max-width: 760px; }
  .hint b { color: var(--ink); font-weight: 600; }
  .theme-btn {
    flex: none; background: var(--card); color: var(--ink);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 9px 13px; font-size: 14px; cursor: pointer; line-height: 1;
    display: inline-flex; align-items: center; gap: 7px;
    box-shadow: var(--shadow-soft); transition: transform .12s, border-color .2s;
  }
  .theme-btn:hover { transform: translateY(-1px); border-color: var(--accent); }
  .theme-btn .lbl { font-size: 12.5px; color: var(--ink-dim); }

  /* ============ 主布局：棋盘居中为核心，日志为次要侧栏 ============ */
  .stage {
    max-width: 1180px; margin: 0 auto;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(320px, 400px);
    gap: 22px; align-items: start;
  }
  @media (max-width: 920px) {
    .stage { grid-template-columns: 1fr; }
  }

  /* —— 中央棋盘卡 —— */
  .board-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow); padding: 18px clamp(14px, 3vw, 26px) 20px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }

  /* 控制小框（右侧栏顶部：棋种 / 配座 / 动作按钮） */
  .control-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; box-shadow: var(--shadow-soft);
    display: flex; flex-direction: column; gap: 11px;
  }
  .ctl-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .ctl-row .lbl { color: var(--ink-faint); font-size: 12px; }
  .seat-group { display: inline-flex; align-items: center; gap: 6px; padding: 4px 8px;
                background: var(--card-2); border: 1px solid var(--line-soft); border-radius: 10px; }
  select, button {
    background: var(--card-2); color: var(--ink); border: 1px solid var(--line);
    border-radius: 9px; padding: 7px 12px; font-size: 13px; cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s, opacity .15s;
  }
  select:hover, button:hover { border-color: var(--accent); }
  button:active { transform: translateY(1px); }
  select:disabled, button:disabled { opacity: .42; cursor: not-allowed; }
  select:disabled:hover, button:disabled:hover { border-color: var(--line); }
  button.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); font-weight: 600; }
  button.primary:hover { filter: brightness(1.08); }
  button.danger  { background: transparent; border-color: var(--danger); color: var(--danger); font-weight: 600; }
  button.danger:hover  { background: var(--danger); color: #fff; }
  button.hidden { display: none; }
  /* 动作按钮：在小框里平铺一行，自动等宽 */
  .actions { display: flex; gap: 9px; flex-wrap: wrap; }
  .actions button { flex: 1 1 auto; min-width: 84px; }

  /* 棋桌：棋盘被框进带边的容器，居中、为视觉焦点 */
  .table {
    padding: 14px; border-radius: 18px; background: var(--board-frame);
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .bezel { padding: 6px; border-radius: 10px; background: var(--board-bezel); line-height: 0; }
  #view {
    display: block; width: min(560px, 78vw); height: auto; aspect-ratio: 1 / 1;
    border-radius: 6px; cursor: pointer; background: #000;
  }

  /* 选子/提示行 */
  #sel { font-size: 12.5px; color: var(--ink-dim); text-align: center; min-height: 18px; }
  #sel b { color: var(--accent); }

  /* —— 侧栏：状态 + AWI 终端 —— */
  .side { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 22px; }
  @media (max-width: 920px) { .side { position: static; } }

  .statusbar {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; font-size: 12.5px; color: var(--ink-dim); line-height: 1.9;
    box-shadow: var(--shadow-soft);
  }
  .statusbar b { color: var(--ink); }
  .phase { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px;
           font-weight: 600; margin-right: 8px; letter-spacing: .3px; }
  .p-not_start { background: rgba(154,161,173,.18); color: var(--ink-dim); }
  .p-in_game   { background: rgba(64,180,116,.20); color: #4fc285; }
  .p-game_over { background: rgba(224,85,107,.18); color: var(--danger); }

  .term-wrap {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 12px 8px; box-shadow: var(--shadow-soft);
  }
  .term-title { font-size: 11.5px; color: var(--ink-faint); margin: 2px 4px 9px; letter-spacing: .2px; }
  .term {
    background: var(--term-bg); border: 1px solid var(--line-soft); border-radius: 10px;
    padding: 10px 12px; height: 420px; overflow-y: auto;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px; line-height: 1.65; color: #cdd3df;
  }
  .term::-webkit-scrollbar { width: 8px; }
  .term::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }
  .ln { white-space: pre-wrap; word-break: break-all; }
  .t-ts { color: #5c6370; }
  .m-perceive { color: #56b6c2; } .m-invoke { color: #98c379; } .m-capabilities { color: #c678dd; }
  .m-bot { color: #e5c07b; } .m-click { color: #61afef; } .m-setup, .m-reset { color: #e06c75; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="title">
      <h1>棋桌 · 一张能托管象棋 / 五子棋 / 围棋的世界 (AWI)</h1>
      <div class="hint">我握着真棋盘，只给 ANIMA <b>看画面</b> + <b>一组角色 meta（谁坐哪方）+ 阶段（phase）</b>，不告诉它局面坐标。
        配好双方（人 / ANIMA / 电脑）→ 开始。所有「切换类」操作要先暂停。轮到"人"那方：点起子格 → 点目标格走子。</div>
    </div>
    <button class="theme-btn" id="themeToggle" title="切换主题">
      <span id="themeIcon">🌙</span><span class="lbl" id="themeLbl">暗色</span>
    </button>
  </div>

  <div class="stage">
    <!-- 中央：棋盘为视觉焦点 -->
    <div class="board-card">
      <div class="table">
        <div class="bezel">
          <img id="view" width="512" height="512" alt="board" src="/stream" />
        </div>
      </div>
      <div id="sel">配好双方后点「开始」。</div>
    </div>

    <!-- 侧栏：控制 + 状态 + AWI 流量 -->
    <div class="side">
      <div class="control-card">
        <div class="ctl-row">
          <span class="lbl">棋种</span>
          <select id="gameSel">
            <option value="chess">国际象棋</option>
            <option value="gomoku">五子棋</option>
            <option value="go">围棋（占位）</option>
          </select>
        </div>
        <div class="ctl-row">
          <span class="seat-group">
            <span class="lbl">白方</span>
            <select id="white" class="seat"><option value="">空</option><option value="human">人</option><option value="anima">ANIMA</option><option value="bot">电脑</option></select>
          </span>
          <span class="seat-group">
            <span class="lbl">黑方</span>
            <select id="black" class="seat"><option value="">空</option><option value="human">人</option><option value="anima">ANIMA</option><option value="bot">电脑</option></select>
          </span>
        </div>
        <div class="actions">
          <button class="primary" id="start">开始</button>
          <button class="primary" id="newgame">开新局</button>
          <button class="danger" id="resign">认输</button>
          <button id="reset">复位</button>
        </div>
      </div>
      <div class="statusbar" id="status">状态加载中…</div>
      <div class="term-wrap">
        <div class="term-title">AWI 实时流量（谁在调我的接口 · 命令回 success/fail）</div>
        <div class="term" id="term"></div>
      </div>
    </div>
  </div>

<script>
  const view = document.getElementById("view");
  const selInfo = document.getElementById("sel");
  const $ = (id) => document.getElementById(id);
  let fromSq = null;
  let game = "chess", phase = "not_start";
  const GRID = { gomoku: 15, go: 19 };   // 落子类棋种的格数（世界自己的 UI，可写死）

  // ---------- 主题切换（明亮木纹 / 精致暗色，localStorage 记住）----------
  const THEME_KEY = "simchess-theme";
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    const dark = t === "dark";
    $("themeIcon").textContent = dark ? "🌙" : "☀️";
    $("themeLbl").textContent = dark ? "暗色" : "明亮";
  }
  applyTheme(localStorage.getItem(THEME_KEY) || "dark");
  $("themeToggle").onclick = () => {
    const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  };

  // ---------- 棋种选择：切桌（要在非比赛中）----------
  $("gameSel").addEventListener("change", async () => {
    fromSq = null;
    const r = await (await fetch("/switch", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ game: $("gameSel").value }) })).json();
    if (!r.ok) selInfo.textContent = "切棋种失败：" + (r.message || "");
  });

  // ---------- 配座 / 换人：改下拉即生效（空/人/ANIMA/电脑）----------
  function setSeat(seat) {
    const v = $(seat).value;   // "" = 空
    fetch("/set_controller", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ seat, controller: v || null }) })
      .then(r => r.json()).then(r => { if (!r.ok) selInfo.textContent = "配座失败：" + (r.message || ""); });
  }
  $("white").addEventListener("change", () => setSeat("white"));
  $("black").addEventListener("change", () => setSeat("black"));

  // ---------- 生命周期按钮 ----------
  const post = (url, body) => fetch(url, body ? { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) } : { method: "POST" });
  $("start").onclick = async () => { const r = await (await post("/start")).json(); if (!r.ok) selInfo.textContent = "开始失败：" + (r.message || ""); };
  $("newgame").onclick = $("start").onclick;
  $("reset").onclick = () => { fromSq = null; post("/reset"); };
  $("resign").onclick = () => {
    // 认输哪方：认输那个由"人"控制的一方（人 vs ANIMA/电脑 的常见情形）
    const c = window._ctrl || {};
    const side = c.white === "human" ? "white" : (c.black === "human" ? "black" : null);
    if (!side) { selInfo.textContent = "没有「人」坐着，认输按钮无效。"; return; }
    post("/resign", { side });
  };

  // ---------- 点棋盘走子（按棋种 + 阶段解读）----------
  function rc(ev, n) {
    const r = view.getBoundingClientRect();
    const col = Math.max(0, Math.min(n - 1, Math.floor((ev.clientX - r.left) / (r.width / n))));
    const row = Math.max(0, Math.min(n - 1, Math.floor((ev.clientY - r.top) / (r.height / n))));
    return { row, col };
  }
  function sqName(ev) {
    const { row, col } = rc(ev, 8);
    return "abcdefgh"[col] + (8 - row);   // 白方在下
  }
  view.addEventListener("click", async (e) => {
    if (phase !== "in_game") { selInfo.textContent = "现在不在比赛中（先配好双方点开始）。"; return; }
    if (game === "gomoku" || game === "go") {
      const { row, col } = rc(e, GRID[game]);
      const res = await (await post("/place", { row, col })).json();
      selInfo.textContent = res.ok ? "落子" : ("落子失败：" + (res.message || ""));
      return;
    }
    const sq = sqName(e);
    if (!fromSq) {   // 第一次点击=选起子格 → 画高亮圈（这圈也进给 ANIMA 的画面，有意）
      fromSq = sq; selInfo.textContent = "起子格 " + sq + " → 再点目标格";
      post("/select", { sq });
      return;
    }
    const to = sq, frm = fromSq; fromSq = null;
    const res = await (await post("/click", { from_sq: frm, to_sq: to })).json();
    // 无效步 → 世界已清掉选中高亮；提示重新点（rule 9）
    selInfo.textContent = res.ok ? "点一下选起子格…" : ("走子无效，圈已消失，请重新点起子格。（" + (res.message || "") + "）");
  });

  // ---------- 按阶段显隐/禁用控件 ----------
  function applyPhase(s) {
    const both = s.controllers && s.controllers.white && s.controllers.black;
    const inGame = s.phase === "in_game";
    // 切换类（棋种/配座）只在非比赛中可用
    $("gameSel").disabled = inGame;
    $("white").disabled = inGame; $("black").disabled = inGame;
    // 生命周期按钮按阶段显隐
    const show = (id, on) => $(id).classList.toggle("hidden", !on);
    show("start", s.phase === "not_start");
    show("newgame", s.phase === "game_over");
    show("resign", s.phase === "in_game");
    $("start").disabled = !both;   // 双方配齐才能开始
  }

  const PHASE_CN = { not_start: "未开始", in_game: "比赛中", game_over: "对弈结束" };
  const CTRL_CN = { human: "人", anima: "ANIMA", bot: "电脑", null: "空", "": "空" };
  async function refreshStatus() {
    try {
      const s = await (await fetch("/status")).json();
      game = s.game || "chess"; phase = s.phase || "not_start";
      window._ctrl = s.controllers || {};
      const c = s.controllers || {};
      if ($("gameSel").value !== game && document.activeElement !== $("gameSel")) $("gameSel").value = game;
      // 席位下拉跟随世界真值（ANIMA take_seat、别处换人都会反映）——不打断正在操作的那个
      for (const seat of ["white", "black"]) {
        const el = $(seat), v = c[seat] || "";
        if (el.value !== v && document.activeElement !== el) el.value = v;
      }
      const over = s.phase === "game_over" ? `· 结果 ${s.result || "—"}（可「开新局」或在此复盘）` : "";
      $("status").innerHTML =
        `<span class="phase p-${phase}">${PHASE_CN[phase] || phase}</span>` +
        `棋种:<b>${game}</b> · 白:<b>${CTRL_CN[c.white] ?? c.white}</b> 黑:<b>${CTRL_CN[c.black] ?? c.black}</b>` +
        ` · 轮到 <b>${s.turn}</b> · 第 ${s.fullmove} 手 ${over}<br>最近：${s.last || "—"}`;
      applyPhase(s);
    } catch (e) {}
  }
  refreshStatus(); setInterval(refreshStatus, 1000);

  const term = $("term");
  const es = new EventSource("/awi-events");
  es.onmessage = (ev) => {
    const e = JSON.parse(ev.data);
    const line = document.createElement("div");
    line.className = "ln";
    line.innerHTML = `<span class="t-ts">[${e.ts}]</span> <span class="m-${e.method}">${(e.method+"").padEnd(12)}</span> ${esc(e.summary)}`;
    term.appendChild(line);
    while (term.childNodes.length > 300) term.removeChild(term.firstChild);
    term.scrollTop = term.scrollHeight;
  };
  function esc(s) { return (s+"").replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c])); }
</script>
</body>
</html>
